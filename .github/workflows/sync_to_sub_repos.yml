name: Distribute to Sub-Repos

on:
  push:
    branches: [ main ]  # 同步原作者更新或手动 push 到 main 时触发
  workflow_dispatch:     # 支持手动点击 Actions 页面上的按钮测试

jobs:
  distribute:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source (dnf-server-public)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # --- 1. 同步前端 (webui2 目录) ---
      - name: Push Frontend to Infinite-Reflection/dnf-gm-manager-front
        uses: cpina/github-action-push-to-another-repository@main
        env:
          API_TOKEN_GITHUB: ${{ secrets.DNF_GM_SYNC2SUBTREE }}
        with:
          source-directory: 'webui2'
          destination-github-username: 'Infinite-Reflection' # 组织名作为目标所有者
          destination-repository-name: 'dnf-gm-manager-front'
          user-email: 'pzookloop@users.noreply.github.com'
          target-branch: 'upstream-sync'
          # 如果分支不存在则创建
          create-target-branch-if-needed: true
          target-directory: ''

      # --- 2. 准备并同步后端 (直接手动一把梭) ---
      - name: Sync Backend Manually
        env:
          API_TOKEN_GITHUB: ${{ secrets.DNF_GM_SYNC2SUBTREE }}
        run: |
          # 创建一个临时目录用来放后端代码
          mkdir ../backend_final
          
          # 使用 rsync 排除掉前端 webui2、.github 配置和 .idea 缓存
          # 这样剩下的就全是纯净的后端代码
          rsync -av . ../backend_final/ \
            --exclude='webui2' \
            --exclude='.github' \
            --exclude='.idea' \
            --exclude='.git'
          
          cd ../backend_final
          
          # 重新初始化一个干净的 Git 环境
          git init
          git config user.name "pzookloop"
          git config user.email "pzookloop@users.noreply.github.com"
          
          # 构造带 Token 的远程地址 (前端能过，这个地址后端必通)
          REMOTE_URL="https://x-access-token:${{ secrets.DNF_GM_SYNC2SUBTREE }}@github.com/Infinite-Reflection/dnf-gm-manager-backend.git"
          
          git remote add origin "$REMOTE_URL"
          git add .
          git commit -m "chore: automated sync from upstream main ($GITHUB_SHA)"
          
          # 强制覆盖目标仓库的 upstream-sync 分支
          git push origin HEAD:upstream-sync --force